# docker-compose.yml — SIMPLIFIED VERSION
# Down from 6 services to 2. SQLite lives inside the API container.

version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data                         # satellite images
      - ./models/checkpoints:/app/checkpoints    # model weights
      - ./disaster_ai.db:/app/disaster_ai.db     # SQLite database file
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.simple              # lightweight Vite server
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
