# Configuration for Simplified DisasterAI System

paths:
  active_checkpoint: "models/checkpoints/active_model.pth"
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

database:
  url: "sqlite:///./disaster_ai.db"

sentinel:
  tile_size: 512
  overlap: 32
  bands:
    - B2
    - B3
    - B4
    - B8  # Blue, Green, Red, NIR
  cloud_cover_threshold: 20
  temporal_window: 30  # days before and after disaster
  resolution: 10  # meters

model:
  architecture: "unet"
  encoder_name: "resnet50"
  encoder_weights: "imagenet"
  in_channels: 9
  num_classes: 4
  tile_size: 256
  hrnet_width: 32

preprocessing:
  target_hw: 512

training:
  batch_size: 8
  lr: 0.0001
  step_size: 10
  gamma: 0.1
  max_epochs: 100
  early_stopping_patience: 10
  checkpoint_path: "checkpoints/damage_model.pth"

data:
  image_dir: "data/processed/images"
  label_dir: "data/processed/labels"
  subset_size: null

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"