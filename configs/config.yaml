paths:
  - src/data_pipeline/landsat_fetcher.py
  - src/data_pipeline/nlp_filter.py
  - src/data_pipeline/dataset_builder.py
  - src/data_pipeline/satellite_fetcher.py
  - src/data_pipeline/preprocessor.py
  - requirements.txt
  - .env

# Updated config for enhanced processing

sentinel:
  tile_size: 512
  bands:
    - B2
    - B3
    - B4
    - B8  # Blue, Green, Red, NIR
  cloud_cover_threshold: 20
  temporal_window: 30  # days before and after disaster
  resolution: 10  # meters

model:
  encoder_name: resnet50
  encoder_weights: imagenet
  num_classes: 4
  model_architecture: unet
  hrnet_width: 32

training:
  batch_size: 8
  lr: 0.0001
  step_size: 10
  gamma: 0.1
  max_epochs: 100
  early_stopping_patience: 10
  checkpoint_path: checkpoints/damage_model.pth

data:
  image_dir: data/processed/images
  label_dir: data/processed/labels
  subset_size: null

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - "*"